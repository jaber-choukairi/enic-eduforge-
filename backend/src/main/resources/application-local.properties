server.port=8080
server.servlet.context-path=/api

spring.datasource.url=jdbc:h2:mem:enicconnect;MODE=MySQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=password

spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

spring.web.cors.allowed-origins=http://localhost:4200,http://localhost:5500,http://127.0.0.1:5500,http://localhost:5501,http://localhost:3000
spring.web.cors.allowed-methods=GET,POST,PUT,DELETE,OPTIONS,PATCH
spring.web.cors.allowed-headers=*
spring.web.cors.allow-credentials=true

logging.level.com.enicconnect=DEBUG
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.springframework.security=WARN
