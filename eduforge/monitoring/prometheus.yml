# EduForge — Prometheus Configuration
# Scrapes: API gateway · Celery workers · PostgreSQL exporter · Redis exporter

global:
  scrape_interval: 15s
  evaluation_interval: 15s
  scrape_timeout: 10s
  external_labels:
    service: eduforge
    environment: production

alerting:
  alertmanagers:
    - static_configs:
        - targets: []

rule_files: []

scrape_configs:

  # ── EduForge API ────────────────────────────────────────────────────────────
  - job_name: eduforge-api
    static_configs:
      - targets: ["api:8000"]
    metrics_path: /metrics
    scheme: http
    scrape_interval: 15s

  # ── Celery Workers (via flower or prometheus exporter) ──────────────────────
  - job_name: celery-workers
    static_configs:
      - targets:
          - "worker-ingestion:9000"
          - "worker-generation:9000"
          - "worker-training:9000"
    metrics_path: /metrics
    scrape_interval: 30s

  # ── Redis ───────────────────────────────────────────────────────────────────
  - job_name: redis
    static_configs:
      - targets: ["redis:6379"]
    scrape_interval: 30s

  # ── PostgreSQL ───────────────────────────────────────────────────────────────
  - job_name: postgres
    static_configs:
      - targets: ["postgres:5432"]
    scrape_interval: 30s

  # ── ChromaDB ────────────────────────────────────────────────────────────────
  - job_name: chromadb
    static_configs:
      - targets: ["chromadb:8000"]
    metrics_path: /api/v1/heartbeat
    scrape_interval: 60s

  # ── Prometheus self-monitoring ───────────────────────────────────────────────
  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]
