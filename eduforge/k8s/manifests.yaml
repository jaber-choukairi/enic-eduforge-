# ── EduForge — Kubernetes Manifests ───────────────────────────────────────────
# Deploy with: kubectl apply -f k8s/
# Tested with: kubectl v1.34 + minikube
#
# Resources:
#   Namespace → ConfigMap → Secrets → PVCs →
#   Deployments (api, workers) → Services → HPA → Ingress

---
# ── Namespace ─────────────────────────────────────────────────────────────────
apiVersion: v1
kind: Namespace
metadata:
  name: eduforge
  labels:
    app.kubernetes.io/name: eduforge
    app.kubernetes.io/version: "1.0.0"

---
# ── ConfigMap ─────────────────────────────────────────────────────────────────
apiVersion: v1
kind: ConfigMap
metadata:
  name: eduforge-config
  namespace: eduforge
data:
  ENV: "production"
  DEBUG: "false"
  LOG_LEVEL: "INFO"
  API_HOST: "0.0.0.0"
  API_PORT: "8000"
  CHROMA_HOST: "chromadb-service"
  CHROMA_PORT: "8000"
  MLFLOW_TRACKING_URI: "http://mlflow-service:5000"
  EMBEDDING_MODEL: "sentence-transformers/all-MiniLM-L6-v2"
  GENERATION_MODEL: "google/flan-t5-small"
  CHUNK_SIZE: "512"
  CHUNK_OVERLAP: "64"
  MAX_EXAM_QUESTIONS: "50"

---
# ── Secret ────────────────────────────────────────────────────────────────────
# IMPORTANT: Replace base64 values before production deploy
# echo -n "your-value" | base64
apiVersion: v1
kind: Secret
metadata:
  name: eduforge-secrets
  namespace: eduforge
type: Opaque
data:
  SECRET_KEY: Y2hhbmdlLW1lLWluLXByb2R1Y3Rpb24=   # change-me-in-production
  DATABASE_URL: cG9zdGdyZXNxbDovL2VkdWZvcmdlOmVkdWZvcmdlQHBvc3RncmVzLXNlcnZpY2U6NTQzMi9lZHVmb3JnZQ==
  REDIS_URL: cmVkaXM6Ly9yZWRpcy1zZXJ2aWNlOjYzNzkvMA==
  CELERY_BROKER_URL: cmVkaXM6Ly9yZWRpcy1zZXJ2aWNlOjYzNzkvMQ==
  CELERY_RESULT_BACKEND: cmVkaXM6Ly9yZWRpcy1zZXJ2aWNlOjYzNzkvMg==
  POSTGRES_PASSWORD: ZWR1Zm9yZ2U=

---
# ── PersistentVolumeClaims ────────────────────────────────────────────────────
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: model-cache-pvc
  namespace: eduforge
spec:
  accessModes: ["ReadWriteMany"]
  resources:
    requests:
      storage: 10Gi
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: upload-pvc
  namespace: eduforge
spec:
  accessModes: ["ReadWriteMany"]
  resources:
    requests:
      storage: 20Gi
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: postgres-pvc
  namespace: eduforge
spec:
  accessModes: ["ReadWriteOnce"]
  resources:
    requests:
      storage: 20Gi
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: redis-pvc
  namespace: eduforge
spec:
  accessModes: ["ReadWriteOnce"]
  resources:
    requests:
      storage: 2Gi
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: chroma-pvc
  namespace: eduforge
spec:
  accessModes: ["ReadWriteOnce"]
  resources:
    requests:
      storage: 15Gi
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: mlflow-pvc
  namespace: eduforge
spec:
  accessModes: ["ReadWriteMany"]
  resources:
    requests:
      storage: 10Gi

---
# ── PostgreSQL Deployment ─────────────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres
  namespace: eduforge
  labels:
    app: postgres
spec:
  replicas: 1
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
    spec:
      containers:
        - name: postgres
          image: postgres:15-alpine
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRES_USER
              value: eduforge
            - name: POSTGRES_DB
              value: eduforge
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: eduforge-secrets
                  key: POSTGRES_PASSWORD
          volumeMounts:
            - name: postgres-storage
              mountPath: /var/lib/postgresql/data
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "1Gi"
              cpu: "500m"
          livenessProbe:
            exec:
              command: ["pg_isready", "-U", "eduforge"]
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "eduforge"]
            initialDelaySeconds: 5
            periodSeconds: 5
      volumes:
        - name: postgres-storage
          persistentVolumeClaim:
            claimName: postgres-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: postgres-service
  namespace: eduforge
spec:
  selector:
    app: postgres
  ports:
    - port: 5432
      targetPort: 5432
  type: ClusterIP

---
# ── Redis Deployment ──────────────────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis
  namespace: eduforge
  labels:
    app: redis
spec:
  replicas: 1
  selector:
    matchLabels:
      app: redis
  template:
    metadata:
      labels:
        app: redis
    spec:
      containers:
        - name: redis
          image: redis:7-alpine
          args: ["redis-server", "--maxmemory", "512mb", "--maxmemory-policy", "allkeys-lru"]
          ports:
            - containerPort: 6379
          volumeMounts:
            - name: redis-storage
              mountPath: /data
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "768Mi"
              cpu: "250m"
          livenessProbe:
            exec:
              command: ["redis-cli", "ping"]
            initialDelaySeconds: 10
            periodSeconds: 10
      volumes:
        - name: redis-storage
          persistentVolumeClaim:
            claimName: redis-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: redis-service
  namespace: eduforge
spec:
  selector:
    app: redis
  ports:
    - port: 6379
      targetPort: 6379
  type: ClusterIP

---
# ── ChromaDB Deployment ───────────────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: chromadb
  namespace: eduforge
  labels:
    app: chromadb
spec:
  replicas: 1
  selector:
    matchLabels:
      app: chromadb
  template:
    metadata:
      labels:
        app: chromadb
    spec:
      containers:
        - name: chromadb
          image: chromadb/chroma:latest
          ports:
            - containerPort: 8000
          env:
            - name: ANONYMIZED_TELEMETRY
              value: "false"
          volumeMounts:
            - name: chroma-storage
              mountPath: /chroma/chroma
          resources:
            requests:
              memory: "512Mi"
              cpu: "250m"
            limits:
              memory: "2Gi"
              cpu: "1000m"
      volumes:
        - name: chroma-storage
          persistentVolumeClaim:
            claimName: chroma-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: chromadb-service
  namespace: eduforge
spec:
  selector:
    app: chromadb
  ports:
    - port: 8000
      targetPort: 8000
  type: ClusterIP

---
# ── EduForge API Deployment ───────────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: eduforge-api
  namespace: eduforge
  labels:
    app: eduforge-api
    version: "1.0.0"
spec:
  replicas: 2
  selector:
    matchLabels:
      app: eduforge-api
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: eduforge-api
        version: "1.0.0"
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8000"
        prometheus.io/path: "/metrics"
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
      containers:
        - name: api
          image: eduforge:1.0.0
          imagePullPolicy: IfNotPresent
          command:
            - uvicorn
            - services.gateway.main:app
            - --host=0.0.0.0
            - --port=8000
            - --workers=2
            - --loop=asyncio
          ports:
            - containerPort: 8000
              name: http
          envFrom:
            - configMapRef:
                name: eduforge-config
            - secretRef:
                name: eduforge-secrets
          volumeMounts:
            - name: model-cache
              mountPath: /app/data/models
            - name: uploads
              mountPath: /app/data/raw
          resources:
            requests:
              memory: "1Gi"
              cpu: "500m"
            limits:
              memory: "4Gi"
              cpu: "2000m"
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 90
            periodSeconds: 30
            timeoutSeconds: 10
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
      volumes:
        - name: model-cache
          persistentVolumeClaim:
            claimName: model-cache-pvc
        - name: uploads
          persistentVolumeClaim:
            claimName: upload-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: eduforge-api-service
  namespace: eduforge
spec:
  selector:
    app: eduforge-api
  ports:
    - port: 80
      targetPort: 8000
      name: http
  type: ClusterIP

---
# ── Celery Worker — Ingestion ─────────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: worker-ingestion
  namespace: eduforge
  labels:
    app: worker-ingestion
spec:
  replicas: 2
  selector:
    matchLabels:
      app: worker-ingestion
  template:
    metadata:
      labels:
        app: worker-ingestion
    spec:
      containers:
        - name: worker
          image: eduforge:1.0.0
          imagePullPolicy: IfNotPresent
          command:
            - celery
            - -A
            - workers.tasks.celery_app
            - worker
            - --queues=ingestion
            - --concurrency=2
            - --loglevel=info
          envFrom:
            - configMapRef:
                name: eduforge-config
            - secretRef:
                name: eduforge-secrets
          volumeMounts:
            - name: model-cache
              mountPath: /app/data/models
            - name: uploads
              mountPath: /app/data/raw
          resources:
            requests:
              memory: "1Gi"
              cpu: "500m"
            limits:
              memory: "3Gi"
              cpu: "2000m"
      volumes:
        - name: model-cache
          persistentVolumeClaim:
            claimName: model-cache-pvc
        - name: uploads
          persistentVolumeClaim:
            claimName: upload-pvc

---
# ── Celery Worker — Generation ────────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: worker-generation
  namespace: eduforge
  labels:
    app: worker-generation
spec:
  replicas: 1
  selector:
    matchLabels:
      app: worker-generation
  template:
    metadata:
      labels:
        app: worker-generation
    spec:
      containers:
        - name: worker
          image: eduforge:1.0.0
          imagePullPolicy: IfNotPresent
          command:
            - celery
            - -A
            - workers.tasks.celery_app
            - worker
            - --queues=generation
            - --concurrency=1
            - --loglevel=info
          envFrom:
            - configMapRef:
                name: eduforge-config
            - secretRef:
                name: eduforge-secrets
          volumeMounts:
            - name: model-cache
              mountPath: /app/data/models
          resources:
            requests:
              memory: "2Gi"
              cpu: "1000m"
            limits:
              memory: "6Gi"
              cpu: "4000m"
      volumes:
        - name: model-cache
          persistentVolumeClaim:
            claimName: model-cache-pvc

---
# ── Celery Worker — Training ──────────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: worker-training
  namespace: eduforge
  labels:
    app: worker-training
spec:
  replicas: 1
  selector:
    matchLabels:
      app: worker-training
  template:
    metadata:
      labels:
        app: worker-training
    spec:
      containers:
        - name: worker
          image: eduforge:1.0.0
          imagePullPolicy: IfNotPresent
          command:
            - celery
            - -A
            - workers.tasks.celery_app
            - worker
            - --queues=training
            - --concurrency=1
            - --loglevel=info
          envFrom:
            - configMapRef:
                name: eduforge-config
            - secretRef:
                name: eduforge-secrets
          volumeMounts:
            - name: model-cache
              mountPath: /app/data/models
          resources:
            requests:
              memory: "4Gi"
              cpu: "2000m"
            limits:
              memory: "8Gi"
              cpu: "4000m"
      volumes:
        - name: model-cache
          persistentVolumeClaim:
            claimName: model-cache-pvc

---
# ── Horizontal Pod Autoscalers ────────────────────────────────────────────────
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: eduforge-api-hpa
  namespace: eduforge
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: eduforge-api
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: worker-ingestion-hpa
  namespace: eduforge
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: worker-ingestion
  minReplicas: 1
  maxReplicas: 6
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 75

---
# ── Ingress ───────────────────────────────────────────────────────────────────
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: eduforge-ingress
  namespace: eduforge
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: "100m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "300"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "300"
    nginx.ingress.kubernetes.io/rate-limit-connections: "10"
    nginx.ingress.kubernetes.io/rate-limit-rps: "30"
spec:
  ingressClassName: nginx
  rules:
    - host: eduforge.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: eduforge-api-service
                port:
                  name: http
